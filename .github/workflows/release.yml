name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run ci
      - run: npm run build

      - name: Package dist
        run: |
          tar -czf flute-select-${{ github.ref_name }}.tar.gz dist/ styles/ README.md package.json
          zip -r flute-select-${{ github.ref_name }}.zip dist/ styles/ README.md package.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            flute-select-${{ github.ref_name }}.tar.gz
            flute-select-${{ github.ref_name }}.zip
            dist/flute-select.js
            dist/flute-select.css
