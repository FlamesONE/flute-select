name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run ci
      - run: npm run build

      - name: Create gzipped versions
        run: |
          gzip -k dist/flute-select.js
          gzip -k dist/flute-select.css

      - name: Generate size report
        run: |
          echo "## Bundle sizes" > sizes.md
          echo "" >> sizes.md
          echo "| File | Raw | Gzip |" >> sizes.md
          echo "|---|---|---|" >> sizes.md
          JS_RAW=$(wc -c < dist/flute-select.js | tr -d ' ')
          JS_GZ=$(wc -c < dist/flute-select.js.gz | tr -d ' ')
          CSS_RAW=$(wc -c < dist/flute-select.css | tr -d ' ')
          CSS_GZ=$(wc -c < dist/flute-select.css.gz | tr -d ' ')
          echo "| JS | ${JS_RAW}B | ${JS_GZ}B |" >> sizes.md
          echo "| CSS | ${CSS_RAW}B | ${CSS_GZ}B |" >> sizes.md
          echo "| **Total** | **$((JS_RAW + CSS_RAW))B** | **$((JS_GZ + CSS_GZ))B** |" >> sizes.md
          cat sizes.md

      - name: Package dist
        run: |
          tar -czf flute-select-${{ github.ref_name }}.tar.gz dist/ styles/ README.md package.json
          zip -r flute-select-${{ github.ref_name }}.zip dist/ styles/ README.md package.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: sizes.md
          files: |
            flute-select-${{ github.ref_name }}.tar.gz
            flute-select-${{ github.ref_name }}.zip
            dist/flute-select.js
            dist/flute-select.css
            dist/flute-select.js.gz
            dist/flute-select.css.gz
